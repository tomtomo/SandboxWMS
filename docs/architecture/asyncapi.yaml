asyncapi: 3.0.0

# What: Authoritative cross-context integration-event catalog (ADR-0023).
# Why: satu artefak otoritatif yang menyatakan emitter -> receiver -> trigger untuk
#   seam Event-Driven (ADR-0005). Tipe CLR di `*.Contracts` mengikat ke channel via
#   logical identity `{module}.{event_snake}.v{N}`; FF #11 (Wms.Architecture.Tests)
#   menjaga doc <-> kode tetap sinkron (directional: tiap tipe published wajib punya
#   channel terdeklarasi). "Spec-wins" sebagai drift rule.
# How: AsyncAPI 3.0 in-source, git-versioned & PR-reviewed seperti kode. Channel
#   `inbound.gr_confirmed.v1` terisi penuh; empat channel lain placeholder (payload
#   provisional dari overview/ADR, diratifikasi saat tipe-nya lahir di Phase 03).

info:
  title: TomSandboxWMS — Integration Event Catalog
  version: 1.0.0
  description: |
    Katalog **otoritatif** integration-event lintas bounded-context untuk TomSandboxWMS
    (ADR-0023). Hanya integration event ber-versi (`*.Contracts`, POCO) yang menyeberang
    broker via Outbox/Inbox (ADR-0005, ADR-0009); domain event tetap in-process.

    **Logical identity:** `{module}.{event_snake}.v{N}` — nama broker-facing yang stabil,
    decoupled dari tipe CLR (rename kelas bukan breaking change). Di-bind di tipe contract
    lewat `const string LogicalName`.

    **SemVer bump rule (ADR-0023):** tambah field nullable = non-breaking (tetap `vN`);
    remove / rename / retype / tighten = breaking → `v{N+1}` (channel baru, versi lama tetap).

    ### Matriks emitter → receiver → trigger

    | Logical name | Emitter | Receiver(s) | Trigger (overview) | Consumed? | Realisasi |
    |---|---|---|---|---|---|
    | `inbound.gr_confirmed.v1` | Inbound | Inventory | `GoodsReceipt` Pending→Confirmed (§A4 Confirm) | ✅ ya | **aktif** (01c/02b) |
    | `outbound.wave_released.v1` | Outbound | Inventory | `Wave` (none)→Active; SPV buat wave (§C2) | ✅ ya | tipe+consumer **03b** · emitter 03c |
    | `inventory.stock_allocated.v1` | Inventory | Outbound | `Stock` Available→Allocated; semua line wave teralokasi (§C3) | ✅ ya | **aktif** (03b; consumer 03c) |
    | `outbound.shipment_dispatched.v1` | Outbound | Inventory | `Wave` Ready→Dispatched (§C6) | ✅ ya | tipe+consumer **03b** · emitter 03c |
    | `outbound.picking_completed.v1` | Outbound | Inventory | `PickingTask` Assigned→Completed (§B/§C5, ADR-0028) | ✅ ya | tipe+consumer **03b** · emitter 03c |
    | `inventory.putaway_completed.v1` | Inventory | Reporting | `PutawayTask` Assigned→Completed (§B2, ADR-0030) | ✅ ya | tipe+emitter+consumer **04c** |
    | `inventory.stock_removed.v1` | Inventory | Reporting | Stock `Picked→removed` saat dispatch (§B, ADR-0030) | ✅ ya | tipe+emitter+consumer **04c** |
    | `inventory.stock_allocation_failed.v1` | Inventory | Outbound, Notification | line wave tak teralokasi penuh — stock kurang/nol (§B#2, ADR-0034) | ✅ ya | tipe+emitter+consumer **(ADR-0034)** |
    | `inventory.stock_low.v*` | Inventory | — (none) | Stock qty < threshold | ⚠️ **emitted-but-unconsumed gap** (ADR-0023) | tak di-scope |
    | `inventory.stock_near_expiry.v*` | Inventory | — (none) | Batch expiry < threshold | ⚠️ **emitted-but-unconsumed gap** (ADR-0023) | tak di-scope |

    Dua baris terakhir adalah **gap eksplisit** — sinyal yang (saat lahir) akan dipancarkan
    tanpa konsumen; sengaja **tak diberi channel** sampai konsumennya ada (hormati reverse-
    coverage sebagai known gap, ADR-0023). `StockQuarantineStale` bukan broker-event — di-wire
    di Phase 07c via `IDelayedTaskQueue` (in-service delayed task), di luar katalog ini.

    > **Drift guard:** FF #11 contract-coverage (`tests/Wms.Architecture.Tests`) mem-parse file
    > ini + reflect tipe `*.Contracts`; tiap tipe published wajib punya channel `address` di sini.
  license:
    name: Sandbox / internal learning artifact
  tags:
    - name: eda
      description: Event-Driven Architecture seam (ADR-0005)
    - name: published-language
      description: Integration events as Published Language (ADR-0009)

defaultContentType: application/json

#
# CHANNELS — tiap `address` = logical identity yang dijaga FF #11.
#
channels:
  inboundGrConfirmed:
    address: inbound.gr_confirmed.v1
    title: Goods Receipt Confirmed
    summary: Penerimaan barang dikonfirmasi SPV — barang siap masuk inventory.
    description: |
      Dipancarkan Inbound saat `GoodsReceipt` transisi Pending→Confirmed (§A4). Membawa
      `receivedLines[]` (lineStatus=Good/QcHold). Inventory: per line buat `Stock`
      (Good→OnHand) + `PutawayTask`. **Channel terisi penuh** (CLR: `GRConfirmedV1`).
    messages:
      grConfirmed:
        $ref: '#/components/messages/GRConfirmedV1'

  outboundWaveReleased:
    address: outbound.wave_released.v1
    title: Wave Released
    summary: Wave dirilis untuk diproses — picking & dispatch bersama.
    description: |
      Diratifikasi Phase 03b (consumer-first): `WaveReleasedV1` (`Wms.Outbound.Contracts`) sudah
      lahir & dikonsumsi Inventory (alokasi `Stock` Available→Allocated per FEFO). Emitter Outbound
      (`Wave` (none)→Active, §C2) menyusul Phase 03c memakai tipe yang sama.
    messages:
      waveReleased:
        $ref: '#/components/messages/WaveReleasedV1'

  inventoryStockAllocated:
    address: inventory.stock_allocated.v1
    title: Stock Allocated
    summary: Stock direservasi untuk sebuah wave.
    description: |
      Diratifikasi Phase 03b: `StockAllocatedV1` (`Wms.Inventory.Contracts`) dipancarkan Inventory
      setelah semua line wave teralokasi FEFO (§C3) — ditulis via Outbox. Consumer Outbound (buat
      `PickingTask` per entry `allocations[]`) menyusul Phase 03c.
    messages:
      stockAllocated:
        $ref: '#/components/messages/StockAllocatedV1'

  outboundShipmentDispatched:
    address: outbound.shipment_dispatched.v1
    title: Shipment Dispatched
    summary: Wave didispatch — truk keluar gudang.
    description: |
      Diratifikasi Phase 03b (consumer-first): `ShipmentDispatchedV1` (`Wms.Outbound.Contracts`)
      sudah lahir & dikonsumsi Inventory (remove `Stock` Picked terikat `waveId`). Emitter Outbound
      (`Wave` Ready→Dispatched, §C6) menyusul Phase 03c.
    messages:
      shipmentDispatched:
        $ref: '#/components/messages/ShipmentDispatchedV1'

  outboundPickingCompleted:
    address: outbound.picking_completed.v1
    title: Picking Completed
    summary: Satu PickingTask selesai — stock pindah ke staging.
    description: |
      Event ke-5, **diputuskan di ADR-0028** untuk merealisasikan sinyal overview §B (`PickingTask`
      Assigned→Completed → `Stock` Allocated→Picked). Diratifikasi Phase 03b (consumer-first):
      `PickingCompletedV1` (`Wms.Outbound.Contracts`) sudah lahir & dikonsumsi Inventory (transisi
      `Stock` Allocated→Picked + set `pickingTaskId`/staging). Emitter Outbound menyusul Phase 03c.
    messages:
      pickingCompleted:
        $ref: '#/components/messages/PickingCompletedV1'

  inventoryPutawayCompleted:
    address: inventory.putaway_completed.v1
    title: Putaway Completed
    summary: Satu PutawayTask selesai — stock OnHand→Available di rak.
    description: |
      Event ke-6, **diputuskan di ADR-0030** (event-carried state transfer untuk read-side). Di-emit
      Inventory saat `CompletePutaway` (PutawayTask Assigned→Completed, overview §B2). Dikonsumsi
      **Reporting** → OperatorActivity (putaway-count per operator). `operatorId` = aktor penyelesai
      (SYSTEM s/d authZ 07a). CLR: `Wms.Inventory.Contracts.PutawayCompletedV1`.
    messages:
      putawayCompleted:
        $ref: '#/components/messages/PutawayCompletedV1'

  inventoryStockRemoved:
    address: inventory.stock_removed.v1
    title: Stock Removed
    summary: Stock keluar gudang saat dispatch (Picked→removed).
    description: |
      Event ke-7, **diputuskan di ADR-0030**. Di-emit Inventory saat ia meng-consume `ShipmentDispatched`
      dan menghapus Stock Picked terikat wave (overview §B `Picked→removed`). Membawa `lines[]`
      (warehouse/sku/batch/qty) — data milik Inventory yang Outbound `shipment_dispatched` tak punya.
      Dikonsumsi **Reporting** → StockOnHandView decrement + DispatchSummary (count + volume).
      CLR: `Wms.Inventory.Contracts.StockRemovedV1`.
    messages:
      stockRemoved:
        $ref: '#/components/messages/StockRemovedV1'

  inventoryStockAllocationFailed:
    address: inventory.stock_allocation_failed.v1
    title: Stock Allocation Failed
    summary: Line wave tak teralokasi penuh — stock kurang/nol.
    description: |
      Event ke-8, **diputuskan di ADR-0034** — ganti silent-drop lama (overview §B#2 yang dulu out-of-scope).
      Di-emit Inventory dari `WaveReleasedConsumer` saat sebuah line tak teralokasi penuh setelah FEFO
      (`remaining > 0`). Membawa `lines[]` (orderId/sku/requested/allocated/short). Dikonsumsi **Outbound**
      (tandai `OrderLine` Short/Backordered) + **Notification** (alert SPV/purchasing). Pola sinyal-gagal ala
      eShop `OrderStockRejected`, eventual (bukan sync ATP-gate). CLR: `Wms.Inventory.Contracts.StockAllocationFailedV1`.
    messages:
      stockAllocationFailed:
        $ref: '#/components/messages/StockAllocationFailedV1'

#
# OPERATIONS — perspektif aplikasi: `send` = emitter, `receive` = consumer (AsyncAPI 3.0).
#   Menyatakan seam emitter→receiver secara eksplisit (routing sudah final di ADR walau
#   payload placeholder belum diisi).
#
operations:
  inboundSendGrConfirmed:
    action: send
    channel:
      $ref: '#/channels/inboundGrConfirmed'
    summary: Inbound mempublish GRConfirmed setelah GoodsReceipt dikonfirmasi.
    messages:
      - $ref: '#/channels/inboundGrConfirmed/messages/grConfirmed'

  inventoryReceiveGrConfirmed:
    action: receive
    channel:
      $ref: '#/channels/inboundGrConfirmed'
    summary: Inventory meng-consume GRConfirmed → Stock(OnHand) + PutawayTask(Assigned).
    messages:
      - $ref: '#/channels/inboundGrConfirmed/messages/grConfirmed'

  outboundSendWaveReleased:
    action: send
    channel:
      $ref: '#/channels/outboundWaveReleased'
    summary: (placeholder) Outbound mempublish WaveReleased saat wave dibuat.
    messages:
      - $ref: '#/channels/outboundWaveReleased/messages/waveReleased'

  inventoryReceiveWaveReleased:
    action: receive
    channel:
      $ref: '#/channels/outboundWaveReleased'
    summary: (placeholder) Inventory meng-consume WaveReleased → alokasi Stock (FEFO).
    messages:
      - $ref: '#/channels/outboundWaveReleased/messages/waveReleased'

  inventorySendStockAllocated:
    action: send
    channel:
      $ref: '#/channels/inventoryStockAllocated'
    summary: (placeholder) Inventory mempublish StockAllocated setelah alokasi.
    messages:
      - $ref: '#/channels/inventoryStockAllocated/messages/stockAllocated'

  outboundReceiveStockAllocated:
    action: receive
    channel:
      $ref: '#/channels/inventoryStockAllocated'
    summary: (placeholder) Outbound meng-consume StockAllocated → buat PickingTask.
    messages:
      - $ref: '#/channels/inventoryStockAllocated/messages/stockAllocated'

  outboundSendShipmentDispatched:
    action: send
    channel:
      $ref: '#/channels/outboundShipmentDispatched'
    summary: (placeholder) Outbound mempublish ShipmentDispatched saat dispatch.
    messages:
      - $ref: '#/channels/outboundShipmentDispatched/messages/shipmentDispatched'

  inventoryReceiveShipmentDispatched:
    action: receive
    channel:
      $ref: '#/channels/outboundShipmentDispatched'
    summary: (placeholder) Inventory meng-consume ShipmentDispatched → remove Stock Picked.
    messages:
      - $ref: '#/channels/outboundShipmentDispatched/messages/shipmentDispatched'

  outboundSendPickingCompleted:
    action: send
    channel:
      $ref: '#/channels/outboundPickingCompleted'
    summary: (placeholder) Outbound mempublish PickingCompleted per PickingTask selesai.
    messages:
      - $ref: '#/channels/outboundPickingCompleted/messages/pickingCompleted'

  inventoryReceivePickingCompleted:
    action: receive
    channel:
      $ref: '#/channels/outboundPickingCompleted'
    summary: (placeholder) Inventory meng-consume PickingCompleted → Stock Allocated→Picked.
    messages:
      - $ref: '#/channels/outboundPickingCompleted/messages/pickingCompleted'

  inventorySendPutawayCompleted:
    action: send
    channel:
      $ref: '#/channels/inventoryPutawayCompleted'
    summary: Inventory mempublish PutawayCompleted saat CompletePutaway (ADR-0030).
    messages:
      - $ref: '#/channels/inventoryPutawayCompleted/messages/putawayCompleted'

  reportingReceivePutawayCompleted:
    action: receive
    channel:
      $ref: '#/channels/inventoryPutawayCompleted'
    summary: Reporting meng-consume PutawayCompleted → OperatorActivity (putaway-count).
    messages:
      - $ref: '#/channels/inventoryPutawayCompleted/messages/putawayCompleted'

  inventorySendStockRemoved:
    action: send
    channel:
      $ref: '#/channels/inventoryStockRemoved'
    summary: Inventory mempublish StockRemoved saat dispatch menghapus Stock Picked (ADR-0030).
    messages:
      - $ref: '#/channels/inventoryStockRemoved/messages/stockRemoved'

  reportingReceiveStockRemoved:
    action: receive
    channel:
      $ref: '#/channels/inventoryStockRemoved'
    summary: Reporting meng-consume StockRemoved → StockOnHandView decrement + DispatchSummary.
    messages:
      - $ref: '#/channels/inventoryStockRemoved/messages/stockRemoved'

  inventorySendStockAllocationFailed:
    action: send
    channel:
      $ref: '#/channels/inventoryStockAllocationFailed'
    summary: Inventory mempublish StockAllocationFailed saat line wave tak teralokasi penuh (ADR-0034).
    messages:
      - $ref: '#/channels/inventoryStockAllocationFailed/messages/stockAllocationFailed'

  outboundReceiveStockAllocationFailed:
    action: receive
    channel:
      $ref: '#/channels/inventoryStockAllocationFailed'
    summary: Outbound meng-consume StockAllocationFailed → tandai OrderLine Short/Backordered.
    messages:
      - $ref: '#/channels/inventoryStockAllocationFailed/messages/stockAllocationFailed'

  notificationReceiveStockAllocationFailed:
    action: receive
    channel:
      $ref: '#/channels/inventoryStockAllocationFailed'
    summary: Notification meng-consume StockAllocationFailed → alert subscriber (stock kurang untuk wave).
    messages:
      - $ref: '#/channels/inventoryStockAllocationFailed/messages/stockAllocationFailed'

#
# COMPONENTS — message + schema reusable.
#
components:
  messages:
    GRConfirmedV1:
      name: GRConfirmedV1
      title: Goods Receipt Confirmed (v1)
      summary: Penerimaan barang dikonfirmasi; lines siap jadi Stock.
      contentType: application/json
      payload:
        $ref: '#/components/schemas/GRConfirmedV1Payload'

    WaveReleasedV1:
      name: WaveReleasedV1
      title: Wave Released (v1)
      summary: Wave dirilis; lines minta alokasi stock (Phase 03b).
      contentType: application/json
      payload:
        $ref: '#/components/schemas/WaveReleasedV1Payload'

    StockAllocatedV1:
      name: StockAllocatedV1
      title: Stock Allocated (v1)
      summary: Hasil alokasi FEFO per line wave (Phase 03b).
      contentType: application/json
      payload:
        $ref: '#/components/schemas/StockAllocatedV1Payload'

    ShipmentDispatchedV1:
      name: ShipmentDispatchedV1
      title: Shipment Dispatched (v1)
      summary: Wave didispatch — Inventory remove Stock Picked (Phase 03b).
      contentType: application/json
      payload:
        $ref: '#/components/schemas/ShipmentDispatchedV1Payload'

    PickingCompletedV1:
      name: PickingCompletedV1
      title: Picking Completed (v1)
      summary: PickingTask selesai — Stock Allocated→Picked (ADR-0028, Phase 03b).
      contentType: application/json
      payload:
        $ref: '#/components/schemas/PickingCompletedV1Payload'

    PutawayCompletedV1:
      name: PutawayCompletedV1
      title: Putaway Completed (v1)
      summary: PutawayTask selesai — Stock OnHand→Available; OperatorActivity (ADR-0030).
      contentType: application/json
      payload:
        $ref: '#/components/schemas/PutawayCompletedV1Payload'

    StockRemovedV1:
      name: StockRemovedV1
      title: Stock Removed (v1)
      summary: Stock keluar gudang saat dispatch; StockOnHandView decrement + DispatchSummary (ADR-0030).
      contentType: application/json
      payload:
        $ref: '#/components/schemas/StockRemovedV1Payload'

    StockAllocationFailedV1:
      name: StockAllocationFailedV1
      title: Stock Allocation Failed (v1)
      summary: Line wave tak teralokasi penuh — Outbound tandai Short/Backordered + Notification alert (ADR-0034).
      contentType: application/json
      payload:
        $ref: '#/components/schemas/StockAllocationFailedV1Payload'

  schemas:
    # --- Channel terisi penuh: harus cermin tipe Wms.Inbound.Contracts.GRConfirmedV1 ---
    GRConfirmedV1Payload:
      type: object
      additionalProperties: false
      required: [grId, warehouseId, receivedLines, rejectedLines]
      properties:
        grId:
          type: string
          format: uuid
          description: Identitas GoodsReceipt yang dikonfirmasi.
        warehouseId:
          type: string
          description: Warehouse tempat penerimaan.
        supplierId:
          type: [string, "null"]
          description: Supplier GR (nullable; enrichment ADR-0030 untuk Reporting ReceivingSummary per-supplier).
        receivedLines:
          type: array
          description: Line yang diterima (Good→OnHand, QcHold→Quarantine di Inventory).
          items:
            $ref: '#/components/schemas/ReceivedLineV1'
        rejectedLines:
          type: array
          description: Line ditolak (WrongItem→ReturnToSupplier, OverDelivery excess→RejectExcess) — metadata.
          items:
            $ref: '#/components/schemas/RejectedLineV1'
    ReceivedLineV1:
      type: object
      additionalProperties: false
      required: [sku, quantity, status]
      properties:
        sku:
          type: string
        quantity:
          type: integer
          minimum: 1
        status:
          type: string
          enum: [Good, QcHold]
          description: Kondisi line (two-axis ADR-0013) — menentukan Stock OnHand vs Quarantine.
        batch:
          type: [string, "null"]
          description: Nomor batch (opsional; Stock per-batch + FEFO di 03b).
        expiry:
          type: [string, "null"]
          format: date
          description: Tanggal kadaluarsa (opsional; FEFO di 03b).
    RejectedLineV1:
      type: object
      additionalProperties: false
      required: [sku, quantity, reason]
      properties:
        sku:
          type: string
        quantity:
          type: integer
          minimum: 1
        reason:
          type: string
          enum: [ReturnToSupplier, RejectExcess]

    # --- Diratifikasi Phase 03b: cermin tipe Wms.Outbound.Contracts.* & Wms.Inventory.Contracts.* ---
    WaveReleasedV1Payload:
      type: object
      additionalProperties: false
      required: [waveId, lines]
      properties:
        waveId:
          type: string
          format: uuid
        lines:
          type: array
          description: Per (order, sku) — Inventory alokasi FEFO; orderId untuk korelasi downstream.
          items:
            $ref: '#/components/schemas/WaveLineV1'
    WaveLineV1:
      type: object
      additionalProperties: false
      required: [orderId, sku, qty]
      properties:
        orderId: { type: string, format: uuid }
        sku: { type: string }
        qty: { type: integer, minimum: 1 }

    StockAllocatedV1Payload:
      type: object
      additionalProperties: false
      required: [waveId, allocations]
      properties:
        waveId:
          type: string
          format: uuid
        allocations:
          type: array
          description: Hasil alokasi per line — Stock terpilih (FEFO) untuk wave ini.
          items:
            $ref: '#/components/schemas/StockAllocationV1'
    StockAllocationV1:
      type: object
      additionalProperties: false
      required: [orderId, sku, locationId, qty, stockId]
      properties:
        orderId:
          type: string
          format: uuid
          description: Order pemilik line (dari WaveLineV1) — Outbound atribusikan alokasi ke OrderLine (ADR-0034).
        sku: { type: string }
        locationId: { type: string }
        batch:
          type: [string, "null"]
          description: Batch terpilih (null untuk produk tanpa batch-tracking).
        qty: { type: integer, minimum: 1 }
        stockId: { type: string, format: uuid }

    ShipmentDispatchedV1Payload:
      type: object
      additionalProperties: false
      required: [waveId]
      properties:
        waveId:
          type: string
          format: uuid

    PickingCompletedV1Payload:
      type: object
      additionalProperties: false
      required: [waveId, pickingTaskId, stockId, sku, qty, stagingLocationId]
      properties:
        waveId:
          type: string
          format: uuid
        pickingTaskId:
          type: string
          format: uuid
        stockId:
          type: string
          format: uuid
        sku:
          type: string
        batch:
          type: [string, "null"]
          description: Batch yang dipick (null untuk produk tanpa batch-tracking).
        qty:
          type: integer
          minimum: 1
        stagingLocationId:
          type: string
        operatorId:
          type: [string, "null"]
          description: Aktor penyelesai pick (nullable; enrichment ADR-0030 untuk Reporting OperatorActivity per-operator; SYSTEM s/d authZ 07a).

    # --- ADR-0030: Inventory → Reporting (event-carried state transfer untuk read-side) ---
    PutawayCompletedV1Payload:
      type: object
      additionalProperties: false
      required: [putawayTaskId, stockId, sku, warehouseId]
      properties:
        putawayTaskId:
          type: string
          format: uuid
        stockId:
          type: string
          format: uuid
        sku:
          type: string
        warehouseId:
          type: string
        operatorId:
          type: [string, "null"]
          description: Aktor penyelesai putaway (nullable; SYSTEM s/d authZ 07a). OperatorActivity per-operator.

    StockRemovedV1Payload:
      type: object
      additionalProperties: false
      required: [waveId, lines]
      properties:
        waveId:
          type: string
          format: uuid
        lines:
          type: array
          description: Stock yang keluar gudang (Picked→removed) — dimensi StockOnHandView decrement + DispatchSummary volume.
          items:
            $ref: '#/components/schemas/StockRemovedLineV1'
    StockRemovedLineV1:
      type: object
      additionalProperties: false
      required: [warehouseId, sku, qty]
      properties:
        warehouseId:
          type: string
        sku:
          type: string
        batch:
          type: [string, "null"]
          description: Batch yang keluar (null untuk produk tanpa batch-tracking).
        qty:
          type: integer
          minimum: 1

    # --- ADR-0034: Inventory → Outbound + Notification (sinyal-gagal alokasi, ganti silent-drop) ---
    StockAllocationFailedV1Payload:
      type: object
      additionalProperties: false
      required: [waveId, lines]
      properties:
        waveId:
          type: string
          format: uuid
        lines:
          type: array
          description: Line yang tak teralokasi penuh (hanya yang short; line penuh lewat StockAllocated).
          items:
            $ref: '#/components/schemas/StockAllocationFailedLineV1'
    StockAllocationFailedLineV1:
      type: object
      additionalProperties: false
      required: [orderId, sku, requestedQty, allocatedQty, shortQty]
      properties:
        orderId:
          type: string
          format: uuid
        sku:
          type: string
        requestedQty:
          type: integer
          minimum: 1
        allocatedQty:
          type: integer
          minimum: 0
          description: Qty yang berhasil dialokasi (0 = tak ada stock; >0 = parsial). requested = allocated + short.
        shortQty:
          type: integer
          minimum: 1
          description: Qty kurang (selalu > 0 — line penuh tak masuk event ini).
